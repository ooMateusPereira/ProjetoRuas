services:
  ruas-backend:
    build: .
    container_name: ruas-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      # Persistência do SQLite fora de /var/www (que é read-only neste servidor
      # para criação de novos arquivos/pastas via bind mount)
      - /home/mateus/projetoruas-data:/app/data
    environment:
      - DATABASE_PATH=/app/data/database.db
    networks:
      - ruas-net

networks:
  ruas-net:
    driver: bridge